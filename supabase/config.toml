# Configuración mínima de Supabase CLI para desarrollo local.
# Docs: https://supabase.com/docs/guides/cli/config
project_id = "plataforma-unidos"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]

[db]
port = 54322
major_version = 16

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Activa confirmación por email/teléfono en producción.
enable_signup = true

[auth.email]
enable_confirmations = false  # true en producción

[realtime]
enabled = true
