# Configuración mínima de Supabase CLI para desarrollo local.
# Docs: https://supabase.com/docs/guides/cli/config
project_id = "plataforma-unidos"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]

[db]
port = 54322
# El stack LOCAL del CLI soporta 15/17 (no 16). Esto es solo para dev/CI;
# no afecta al proyecto cloud.
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Activa confirmación por email/teléfono en producción.
enable_signup = true

[auth.email]
enable_confirmations = false  # true en producción

# SMTP propio para PRODUCCIÓN (recuperación/confirmación por Resend). Sin esto, Supabase
# usa su servicio por defecto (limitado a unos pocos correos/hora → no llegan). El stack
# LOCAL usa Inbucket, por eso este bloque va COMENTADO (para no enviar correos reales en
# desarrollo). Para versionar la config de producción: descoméntalo, exporta
# RESEND_SMTP_PASSWORD (= tu API key de Resend) y aplica con `supabase config push`.
# Alternativa recomendada: configurarlo en el Dashboard. Ver docs/08-CORREO-RESEND.md.
# [auth.email.smtp]
# enabled = true
# host = "smtp.resend.com"
# port = 465
# user = "resend"
# pass = "env(RESEND_SMTP_PASSWORD)"
# admin_email = "no-reply@TU-DOMINIO"
# sender_name = "Apoyo por Venezuela"

# Plantillas de correo en español (mismas que se pegan en el Dashboard →
# Authentication → Emails → Templates). content_path es relativo a la raíz del repo.
[auth.email.template.recovery]
subject = "Restablecé tu contraseña — UnidosXVenezuela"
content_path = "./supabase/templates/recuperar.html"

[auth.email.template.confirmation]
subject = "Confirmá tu cuenta — UnidosXVenezuela"
content_path = "./supabase/templates/confirmar.html"

[auth.email.template.magic_link]
subject = "Tu enlace de acceso — UnidosXVenezuela"
content_path = "./supabase/templates/magic-link.html"

[auth.email.template.invite]
subject = "Te invitaron a UnidosXVenezuela"
content_path = "./supabase/templates/invitacion.html"

[auth.email.template.email_change]
subject = "Confirmá tu nuevo correo — UnidosXVenezuela"
content_path = "./supabase/templates/cambio-correo.html"

[realtime]
enabled = true
