# Configuración mínima de Supabase CLI para desarrollo local.
# Docs: https://supabase.com/docs/guides/cli/config
project_id = "plataforma-unidos"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]

[db]
port = 54322
# El stack LOCAL del CLI soporta 15/17 (no 16). Esto es solo para dev/CI;
# no afecta al proyecto cloud.
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Activa confirmación por email/teléfono en producción.
enable_signup = true

[auth.email]
enable_confirmations = false  # true en producción

[realtime]
enabled = true
