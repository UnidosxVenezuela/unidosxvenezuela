name: Tests RLS

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rls:
    runs-on: ubuntu-latest
    env:
      DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - uses: actions/checkout@v4

      - name: Instalar cliente psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - uses: supabase/setup-cli@v1
        with:
          version: latest
        # Autenticar la llamada a la API de GitHub que resuelve la última release:
        # sin token son 60 req/h por IP (compartida entre runners) y falla con
        # «rate limit exceeded»; con GITHUB_TOKEN sube a 1000 req/h por repo.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Arrancamos SIN migraciones y luego las aplicamos con psql en autocommit
      # (una sentencia = una transacción). Así `alter type ... add value` queda
      # confirmado antes de usarse, evitando el error 55P04 "unsafe use of new
      # value" que da la CLI al aplicar cada migración dentro de una transacción.
      - name: Levantar Supabase local (sin migraciones)
        run: |
          mkdir -p /tmp/migs
          mv supabase/migrations/*.sql /tmp/migs/
          supabase start

      - name: Aplicar migraciones por sentencia (autocommit, enum-safe)
        run: |
          for f in $(ls /tmp/migs/*.sql | sort); do
            echo "== Aplicando $(basename "$f") =="
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Conceder privilegios a authenticated (como en Supabase cloud)
        run: |
          psql "$DB_URL" -v ON_ERROR_STOP=1 -c "grant usage on schema public to authenticated, anon; grant all on all tables in schema public to authenticated; grant all on all sequences in schema public to authenticated; grant execute on all functions in schema public to authenticated;"

      - name: Sembrar un admin verificado para las pruebas
        run: |
          psql "$DB_URL" -v ON_ERROR_STOP=1 -c "insert into auth.users (id, email) values ('00000000-0000-0000-0000-0000000000aa', 'admin@test.local');"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -c "update public.perfiles set rol='admin', verificado=true where id='00000000-0000-0000-0000-0000000000aa';"

      - name: Ejecutar pruebas de RLS
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/verificar_rls.sql

      - name: Apagar Supabase
        if: always()
        run: supabase stop
