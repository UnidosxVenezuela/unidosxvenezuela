name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # La versión de pnpm la toma de "packageManager" en package.json (no la dupliques aquí).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Instalar dependencias
        run: pnpm install --no-frozen-lockfile
      - name: Build de la web (incluye type-check de Next)
        run: pnpm --filter @unidos/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: clave-dummy-para-build
